esphome:
  name: liuwb
  friendly_name: liuwb

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

# ESP32 主动连云端 MQTT，避免云服务器直连家庭内网设备。
mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: liuwb
  birth_message:
    topic: liuwb/status
    payload: online
  will_message:
    topic: liuwb/status
    payload: offline
  on_message:
    - topic: liuwb/gpio2/set
      payload: "ON"
      then:
        - switch.turn_on: gpio2_led
    - topic: liuwb/gpio2/set
      payload: "OFF"
      then:
        - switch.turn_off: gpio2_led
    - topic: liuwb/gpio2/blink
      payload: "1"
      then:
        - button.press: gpio2_blink

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Liuwb Fallback Hotspot"
    password: !secret fallback_ap_password

web_server:
  port: 80

# GPIO2 是启动相关管脚，只适合当前板载 LED 联调；正式外设建议换普通 GPIO。
switch:
  - platform: gpio
    id: gpio2_led
    name: "GPIO2 LED"
    pin:
      number: GPIO2
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - mqtt.publish:
          topic: liuwb/gpio2/state
          payload: "ON"
    on_turn_off:
      - mqtt.publish:
          topic: liuwb/gpio2/state
          payload: "OFF"

button:
  - platform: template
    id: gpio2_blink
    name: "GPIO2 Blink"
    on_press:
      - repeat:
          count: 6
          then:
            - switch.toggle: gpio2_led
            - delay: 300ms
      - switch.turn_off: gpio2_led

captive_portal:
